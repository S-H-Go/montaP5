<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>montaP5</title>
    <style>
      :root {
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: #f5f7fb;
        background: #0f172a;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #1e293b 0%, #0f172a 60%);
      }

      #app {
        width: 100%;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      #start-screen {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      #start-button {
        border: 0;
        border-radius: 999px;
        padding: 14px 28px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        color: #0f172a;
        background: #f8fafc;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.35);
      }

      #start-button:disabled {
        opacity: 0.7;
        cursor: wait;
      }

      #sketch {
        line-height: 0;
      }

      canvas {
        max-width: min(100vw - 32px, 100%);
        height: auto !important;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
