<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>montaP5</title>
    <style>
      :root {
        color-scheme: only light;
        font-family: 'Iowan Old Style', 'Palatino Linotype', 'Book Antiqua', Palatino, 'Noto Serif SC', serif;
        color: #120f1f;
        background:
          radial-gradient(circle at top, rgba(180, 203, 253, 0.72), transparent 46%),
          linear-gradient(180deg, #b4cbfd 0%, #d7c79f 42%, #b08247 100%);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 20% 12%, rgba(250, 212, 125, 0.28), transparent 28%),
          radial-gradient(circle at 80% 18%, rgba(31, 48, 24, 0.18), transparent 34%),
          linear-gradient(180deg, #b4cbfd 0%, #d9cda8 46%, #b08247 100%);
      }

      body::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.08;
        background-image:
          linear-gradient(rgba(18, 15, 31, 0.12) 1px, transparent 1px),
          linear-gradient(90deg, rgba(18, 15, 31, 0.08) 1px, transparent 1px);
        background-size: 28px 28px;
        mix-blend-mode: multiply;
      }

      .placard,
      .sketch-frame {
        scrollbar-width: thin;
        scrollbar-color: rgba(18, 15, 31, 0.46) rgba(180, 203, 253, 0.16);
      }

      .placard::-webkit-scrollbar,
      .sketch-frame::-webkit-scrollbar {
        width: 10px;
        height: 10px;
      }

      .placard::-webkit-scrollbar-track,
      .sketch-frame::-webkit-scrollbar-track {
        background: linear-gradient(180deg, rgba(244, 238, 220, 0.92), rgba(224, 210, 176, 0.92));
        border-left: 1px solid rgba(18, 15, 31, 0.08);
      }

      .placard::-webkit-scrollbar-thumb,
      .sketch-frame::-webkit-scrollbar-thumb {
        background: linear-gradient(180deg, rgba(31, 48, 24, 0.78), rgba(18, 15, 31, 0.74));
        border: 2px solid rgba(245, 238, 221, 0.92);
        border-radius: 999px;
      }

      .placard::-webkit-scrollbar-thumb:hover,
      .sketch-frame::-webkit-scrollbar-thumb:hover {
        background: linear-gradient(180deg, rgba(130, 3, 24, 0.74), rgba(31, 48, 24, 0.86));
      }

      .placard::-webkit-scrollbar-corner,
      .sketch-frame::-webkit-scrollbar-corner {
        background: rgba(241, 231, 205, 0.92);
      }

      button,
      input {
        font: inherit;
      }

      input[type='number']::-webkit-outer-spin-button,
      input[type='number']::-webkit-inner-spin-button {
        -webkit-appearance: none;
        margin: 0;
      }

      input[type='number'] {
        -moz-appearance: textfield;
        appearance: textfield;
      }

      #app {
        width: 100%;
        height: 100vh;
        padding: clamp(16px, 3vw, 32px);
        overflow: hidden;
      }

      .stage-shell {
        width: min(1320px, 100%);
        height: 100%;
        margin: 0 auto;
        display: grid;
        grid-template-columns: minmax(280px, 380px) minmax(0, 1fr);
        gap: clamp(16px, 2.4vw, 28px);
        align-items: start;
      }

      .placard,
      .canvas-panel {
        position: relative;
        overflow: hidden;
        border: 1px solid rgba(18, 15, 31, 0.18);
        background: linear-gradient(180deg, rgba(250, 245, 232, 0.92), rgba(241, 231, 205, 0.88));
        box-shadow:
          0 24px 60px rgba(18, 15, 31, 0.12),
          inset 0 1px 0 rgba(255, 255, 255, 0.45);
      }

      .placard {
        display: grid;
        gap: clamp(20px, 2.6vw, 28px);
        padding: clamp(20px, 2.6vw, 32px);
        align-self: start;
        max-height: 100%;
        overflow: auto;
        contain: layout paint;
      }

      .placard::after,
      .canvas-panel::after {
        content: '';
        position: absolute;
        inset: 14px;
        border: 1px solid rgba(18, 15, 31, 0.08);
        pointer-events: none;
      }

      .placard__meta,
      .canvas-panel__head {
        display: flex;
        gap: 16px;
        justify-content: space-between;
        align-items: start;
        flex-wrap: wrap;
      }

      .placard__index,
      .placard__year,
      .placard__eyebrow,
      .canvas-panel__eyebrow,
      .field__label,
      .field__mini,
      .render-form__note,
      .canvas-panel__meta,
      .meta-chip,
      .meta-separator {
        letter-spacing: 0.12em;
        text-transform: uppercase;
        font-size: 11px;
        line-height: 1.5;
      }

      .placard__index,
      .placard__year,
      .canvas-panel__eyebrow,
      .field__label,
      .field__mini,
      .render-form__note,
      .meta-separator {
        color: rgba(18, 15, 31, 0.68);
      }

      .placard__header {
        display: grid;
        gap: 10px;
        max-width: 700px;
      }

      .placard__facts {
        display: grid;
        gap: 14px;
        margin: 0;
        padding-top: 6px;
        border-top: 1px solid rgba(18, 15, 31, 0.12);
      }

      .placard__facts div {
        display: grid;
        gap: 4px;
      }

      .placard__facts dt {
        margin: 0;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        font-size: 11px;
        color: rgba(18, 15, 31, 0.58);
      }

      .placard__facts dd {
        margin: 0;
        font-size: 15px;
        line-height: 1.6;
        color: rgba(18, 15, 31, 0.84);
      }

      .placard__title {
        margin: 0;
        font-size: clamp(52px, 8vw, 96px);
        line-height: 0.95;
        font-weight: 600;
        letter-spacing: -0.04em;
        color: #120f1f;
      }

      .placard__text {
        margin: 0;
        max-width: 34rem;
        font-size: clamp(15px, 2vw, 18px);
        line-height: 1.75;
        color: rgba(18, 15, 31, 0.8);
      }

      .render-form {
        display: grid;
        gap: clamp(18px, 2.4vw, 24px);
      }

      .field {
        display: grid;
        gap: 10px;
      }

      .field--seed {
        max-width: 28rem;
      }

      .field__frame {
        display: grid;
        grid-template-columns: auto 1fr;
        align-items: end;
        gap: 14px;
        border-bottom: 1px solid rgba(18, 15, 31, 0.22);
        padding-bottom: 10px;
      }

      .field__prefix {
        font-size: 13px;
        letter-spacing: 0.16em;
        text-transform: uppercase;
        color: rgba(18, 15, 31, 0.62);
        transform: translateY(-4px);
      }

      .field--size {
        gap: 12px;
      }

      .size-pair {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
        gap: 14px;
        align-items: end;
        max-width: 34rem;
      }

      .size-pair__divider {
        align-self: center;
        padding-bottom: 12px;
        font-size: clamp(22px, 3vw, 30px);
        line-height: 1;
        color: rgba(130, 3, 24, 0.72);
      }

      .field--compact {
        gap: 8px;
      }

      .field input {
        width: 100%;
        border: 0;
        border-bottom: 1px solid rgba(18, 15, 31, 0.22);
        padding: 10px 0 12px;
        font-size: clamp(24px, 4vw, 34px);
        line-height: 1;
        letter-spacing: 0.03em;
        color: #120f1f;
        background: transparent;
        outline: none;
        box-shadow: inset 0 -1px 0 rgba(176, 130, 71, 0);
        transition: border-color 180ms ease, transform 180ms ease, box-shadow 180ms ease;
      }

      .field__frame input {
        border-bottom: 0;
        padding-bottom: 0;
        box-shadow: none;
      }

      .field input:focus,
      .field__frame:has(input:focus) {
        border-color: #820318;
        box-shadow: inset 0 -1px 0 rgba(130, 3, 24, 0.28);
        transform: translateY(-1px);
      }

      .render-form__footer {
        display: grid;
        gap: 18px;
      }

      .render-form__note {
        margin: 0;
        max-width: 30rem;
      }

      .render-form__actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        align-items: center;
      }

      .primary-button,
      .ghost-button {
        min-height: 46px;
        padding: 0 18px;
        border: 1px solid rgba(18, 15, 31, 0.18);
        cursor: pointer;
        transition: transform 180ms ease, background 180ms ease, color 180ms ease, border-color 180ms ease;
      }

      .primary-button {
        color: #f8f2e3;
        background: #120f1f;
      }

      .primary-button:hover,
      .primary-button:focus-visible {
        background: #1f3018;
        transform: translateY(-1px);
      }

      .ghost-button {
        color: #120f1f;
        background: rgba(250, 245, 232, 0.28);
      }

      .ghost-button:hover,
      .ghost-button:focus-visible {
        background: rgba(176, 130, 71, 0.14);
        border-color: rgba(130, 3, 24, 0.28);
        transform: translateY(-1px);
      }

      .primary-button:disabled,
      .ghost-button:disabled {
        opacity: 0.58;
        cursor: wait;
        transform: none;
      }

      .canvas-panel {
        display: grid;
        gap: 16px;
        align-self: start;
        height: 100%;
        min-height: 0;
        padding: clamp(16px, 2.4vw, 24px);
        overflow: hidden;
        contain: layout paint;
      }

      .canvas-panel__meta {
        margin: 8px 0 0;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
      }

      .meta-chip {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        padding: 0 10px;
        border: 1px solid rgba(18, 15, 31, 0.14);
        background: rgba(250, 245, 232, 0.36);
        color: rgba(18, 15, 31, 0.76);
      }

      .sketch-frame {
        display: grid;
        place-items: center;
        line-height: 0;
        padding-top: 6px;
        min-height: 0;
        overflow: auto;
        contain: layout paint;
      }

      canvas,
      .sketch-still {
        display: block;
        width: auto !important;
        height: auto !important;
        max-width: 100%;
        max-height: calc(100vh - 140px);
        border: 1px solid rgba(18, 15, 31, 0.1);
        background: rgba(250, 245, 232, 0.42);
        box-shadow: 0 18px 40px rgba(18, 15, 31, 0.12);
      }

      @media (max-width: 980px) {
        .stage-shell {
          grid-template-columns: 1fr;
        }

        .placard {
          position: relative;
          top: 0;
        }
      }

      @media (max-width: 760px) {
        .placard__title {
          font-size: clamp(42px, 16vw, 72px);
        }

        .size-pair {
          grid-template-columns: 1fr;
        }

        .size-pair__divider {
          display: none;
        }

        .render-form__actions,
        .canvas-panel__head {
          align-items: stretch;
        }

        .primary-button,
        .ghost-button {
          width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
